server:
  port: 0

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: property-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/property/**
          - id: owners-service
            uri: http://localhost :8082
            predicates:
              - Path=/api/owners/**
          - id: tenant-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/tenant/**
          - id: rental-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/rental/**
management:
 endpoints:
  web:
    exposure:
      include: health
