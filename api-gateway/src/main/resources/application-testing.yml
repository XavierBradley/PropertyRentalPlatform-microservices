server:
  port: 0

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: cars-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/cars/**
          - id: owners-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/owners/**
          - id: agents-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/agents/**
          - id: registration-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/registrations/**
management:
 endpoints:
  web:
    exposure:
      include: health
